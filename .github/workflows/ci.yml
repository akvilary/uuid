name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        nim: ['2.0.x', '2.2.x', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim }}

      - name: Install dependencies
        run: nimble install -d -y

      - name: Run tests
        run: nimble test

      - name: Build (release)
        run: nim c -d:release src/uniq.nim
